version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: tattoo-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tattoo_admin
      POSTGRES_PASSWORD: tattoo_secure_password
      POSTGRES_DB: tattoo_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tattoo-network

  backend-api:
    image: maven:3.9-eclipse-temurin-21
    container_name: tattoo-backend-dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/tattoo_management
      - SPRING_DATASOURCE_USERNAME=tattoo_admin
      - SPRING_DATASOURCE_PASSWORD=tattoo_secure_password
    command: mvn spring-boot:run
    depends_on:
      - postgres-db
    networks:
      - tattoo-network

  frontend-app:
    image: node:22-alpine
    container_name: tattoo-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend-api
    networks:
      - tattoo-network

volumes:
  postgres_data:
  maven_cache:

networks:
  tattoo-network:
    driver: bridge